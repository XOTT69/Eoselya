<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f6f8" />
  <title>єОселя — трекер</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>єОселя — трекер</h1>
        <div class="sub">Стабільна версія на окремих файлах</div>
      </div>

      <div class="actions">
        <button id="themeBtn" class="btn secondary">Темна тема</button>
        <button id="markTodayBtn" class="btn primary">Позначити до сьогодні</button>
        <button id="exportCsvBtn" class="btn secondary">Експорт CSV</button>
        <button id="resetBtn" class="btn danger">Скинути все</button>
      </div>
    </header>

    <section class="cards">
      <div class="card">
        <div class="label">Початкова сума</div>
        <div class="value" id="initialAmount">—</div>
      </div>
      <div class="card">
        <div class="label">Залишок тіла</div>
        <div class="value" id="remainingPrincipal">—</div>
      </div>
      <div class="card">
        <div class="label">Сплачено всього</div>
        <div class="value" id="paidTotal">—</div>
      </div>
      <div class="card">
        <div class="label">Сплачено %</div>
        <div class="value" id="paidInterest">—</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Фільтри</h2>
      </div>
      <div class="filters">
        <input id="searchInput" type="text" placeholder="Пошук по даті..." />
        <label class="checkbox-label">
          <input id="unpaidOnly" type="checkbox" />
          Тільки несплачені
        </label>
        <select id="sortField">
          <option value="date">Дата</option>
          <option value="total">Сума</option>
          <option value="interest">Відсотки</option>
          <option value="principal">Тіло</option>
          <option value="remainingAfter">Залишок</option>
        </select>
        <select id="sortDirection">
          <option value="asc">По зростанню</option>
          <option value="desc">По спаданню</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Графік платежів</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Сплачено</th>
              <th>Статус</th>
              <th>Дата оплати</th>
              <th>Планова дата</th>
              <th>Тіло</th>
              <th>%</th>
              <th>Сума</th>
              <th>Залишок після</th>
              <th>Нотатка</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
